<!-- Modal de Confirmación de Eliminación -->
<div class="modal-overlay" id="modal-eliminar-overlay" onclick="cerrarEliminarModal(event)">
    <div class="modal-overlay-inner">
        <div class="modal modal-danger" id="modal-eliminar">
            <div class="modal-header danger" style="background:#fef2f2;border-bottom:2px solid #fca5a5;padding:1.6rem 1.75rem 1.4rem;">
                <div class="modal-header-top">
                    <div style="display:flex;align-items:center;gap:.75rem;">
                        <div style="font-size:2rem;line-height:1;">🚨</div>
                        <div>
                            <div style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--text);">Eliminar Control</div>
                        </div>
                    </div>
                    <button class="modal-close" onclick="cerrarEliminarModal()" style="background:rgba(176,53,128,.1);border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s;">
                        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--text);fill:none;stroke-width:2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            </div>

            <div class="modal-body">
                <p style="font-size:.95rem;color:#b03030;font-weight:500;margin-bottom:1rem;">
                    ¿Estás seguro de que deseas eliminar este control?
                </p>
                
                <!-- Preview del control a eliminar -->
                <div style="background:var(--mg-bg);border:1.5px solid var(--mg-border);border-radius:11px;padding:1rem;margin-bottom:1rem;">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;font-size:.875rem;">
                        <div style="display:flex;flex-direction:column;gap:.3rem;">
                            <span style="font-size:.7rem;color:var(--muted);text-transform:uppercase;font-weight:600;letter-spacing:.07em;">Paciente</span>
                            <span id="me-del-nombre" style="color:var(--text);font-weight:500;">—</span>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:.3rem;">
                            <span style="font-size:.7rem;color:var(--muted);text-transform:uppercase;font-weight:600;letter-spacing:.07em;">Fecha</span>
                            <span id="me-del-fecha" style="color:var(--text);font-weight:500;">—</span>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:.3rem;">
                            <span style="font-size:.7rem;color:var(--muted);text-transform:uppercase;font-weight:600;letter-spacing:.07em;">Semanas</span>
                            <span id="me-del-semanas" style="color:var(--text);font-weight:500;">—</span>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:.3rem;">
                            <span style="font-size:.7rem;color:var(--muted);text-transform:uppercase;font-weight:600;letter-spacing:.07em;">Presión</span>
                            <span id="me-del-presion" style="color:var(--text);font-weight:500;">—</span>
                        </div>
                    </div>
                </div>

                <!-- Advertencia -->
                <div style="background:#fff1f2;border-radius:8px;border-left:3px solid #c0392b;padding:.75rem;font-size:.85rem;color:#c0392b;font-style:italic;margin-bottom:1rem;">
                    ⚠️ Esta acción no se puede deshacer.
                </div>

                <!-- Texto confirmación -->
                <p style="font-size:.85rem;color:var(--muted);line-height:1.5;">
                    El control será eliminado permanentemente de la base de datos. No podrás recuperar esta información.
                </p>
            </div>

            <div class="modal-footer" style="gap:1rem;">
                <button type="button" class="btn-cancel" onclick="cerrarEliminarModal()" style="display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.2rem;background:var(--mg-bg);color:var(--mg);border:1.5px solid var(--mg-border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;flex:1;">
                    Cancelar
                </button>
                <button type="button" class="btn-delete-confirm" onclick="confirmarEliminar()" style="display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.65rem 1.2rem;background:#b03030;color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;flex:1;">
                    <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:white;fill:none;stroke-width:2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    Sí, eliminar control
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-delete-confirm:hover {
        background: #8a2424;
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(176, 48, 48, 0.3);
    }
    .btn-cancel:hover {
        background: var(--mg-border);
    }
</style>
