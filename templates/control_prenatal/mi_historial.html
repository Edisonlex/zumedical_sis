{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zumedical - Mi Historial Prenatal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --mg: #B03580; --mg-l: #CC4D99; --mg-d: #8A2563;
            --mg-bg: #FBF0F7; --mg-border: #E8AAD4;
            --text: #2A1020; --muted: #8A6070; --white: #fff; --bg: #FDF5FA;
            --sw: 260px;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); min-height:100vh; }
        @keyframes pageIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        
        /* HEADER */
        .header { background:linear-gradient(135deg,var(--mg-d),var(--mg-l)); color:white; padding:1.5rem 2rem; }
        .header-content { display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
        .header-logo { display:flex; align-items:center; gap:1rem; }
        .header-logo-img { width:50px; height:50px; border-radius:50%; background:white; display:flex; align-items:center; justify-content:center; }
        .header-logo-img img { width:40px; height:40px; object-fit:contain; }
        .header-title h1 { font-family:'Cormorant Garamond',serif; font-size:1.75rem; }
        .header-title p { font-size:.9rem; opacity:.9; }
        .header-actions a { display:inline-flex; align-items:center; gap:.5rem; padding:.6rem 1.2rem; background:rgba(255,255,255,.2); color:white; border-radius:10px; text-decoration:none; transition:all .2s; }
        .header-actions a:hover { background:rgba(255,255,255,.3); }

        /* MAIN */
        .main { padding:2rem; opacity:0; animation:pageIn .4s ease .05s forwards; }

        /* CARD */
        .card { background:var(--white); border-radius:16px; border:1px solid var(--mg-border); padding:1.5rem; margin-bottom:1.5rem; }
        .card-header { display:flex; align-items:center; gap:.75rem; margin-bottom:1.25rem; padding-bottom:1rem; border-bottom:1px solid var(--mg-border); }
        .card-header svg { width:24px; height:24px; stroke:var(--mg); fill:none; stroke-width:1.8; }
        .card-header h2 { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:600; color:var(--text); }
        .empty-state { text-align:center; padding:3rem; color:var(--muted); }

        .grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:1rem; }
        .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
        @media(max-width:768px) { .grid-2, .grid-3 { grid-template-columns:1fr; } }
        .stat-card { background:var(--mg-bg); border:1px solid var(--mg-border); border-radius:12px; padding:1rem; }
        .stat-label { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
        .stat-value { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:600; color:var(--mg-d); margin-top:.25rem; }

        /* CONTROLS LIST */
        .control-item { border:1px solid var(--mg-border); border-radius:12px; padding:1rem; margin-bottom:1rem; display:flex; flex-direction:column; gap:.75rem; transition:all .15s; background:var(--white); }
        .control-item:hover { border-color:var(--mg); background:var(--mg-bg); }
        .control-top { display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
        .control-date { font-weight:600; color:var(--mg); font-family:'Cormorant Garamond',serif; font-size:1.15rem; }
        .control-semanas { background:var(--mg-bg); color:var(--mg-d); padding:.25rem .75rem; border-radius:999px; font-size:.8rem; font-weight:500; }
        .control-stats { display:flex; gap:1.5rem; flex-wrap:wrap; font-size:.9rem; color:var(--text); }
        .control-stats span strong { color:var(--mg-d); }
        .control-obs { color:var(--muted); font-size:.85rem; margin-top:.5rem; padding-top:.5rem; border-top:1px solid var(--mg-border); }

        .section { display:none; }
        .section.active { display:block; }
        @media(max-width:768px) {
            .header { padding:1rem; }
            .main { padding:1rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="header-logo">
                <div class="header-logo-img">
                    <img src="{% static 'img/Logo.png' %}" alt="Zumedical">
                </div>
                <div class="header-title">
                    <h1>Mi Historial Prenatal</h1>
                    <p>{{ request.user.get_full_name|default:request.user.username }}</p>
                </div>
            </div>
            <div class="header-actions">
                <a href="{% url 'logout' %}">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar Sesión
                </a>
            </div>
        </div>
    </header>

    <main class="main">
        {% if not historia %}
        <div class="card">
            <div class="empty-state">
                <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <h3 style="font-family:'Cormorant Garamond',serif; color:var(--text); margin-bottom:.5rem;">Aún no tienes historia clínica registrada</h3>
                <p>Tu médico registrará tu historia clínica en tu primera consulta</p>
            </div>
        </div>
        {% else %}
        
        <!-- DATOS DE LA HISTORIA
        <div class="card">
            <div class="card-header">
                <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/></svg>
                <h2>Mi Historia Clínica</h2>
            </div>
            <div class="grid-3">
                <div class="stat-card">
                    <div class="stat-label">Fecha de registro</div>
                    <div class="stat-value">{{ historia.fecha_registro|date:"d/m/Y" }}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">IMC inicial</div>
                    <div class="stat-value">{{ historia.imc_inicial|default:"—" }}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Fórmula obstétrica</div>
                    <div class="stat-value">{{ historia.gestas }}G {{ historia.partos }}P {{ historia.cesareas }}C {{ historia.abortos }}A</div>
                </div>
            </div>
        </div>
        
        <!-- CONTROLES PRENATALES
        <div class="card">
            <div class="card-header">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <h2>Mis Controles Prenatales ({{ controles|length }})</h2>
            </div>
            {% if controles %}
            {% for control in controles %}
            <div class="control-item">
                <div class="control-top">
                    <span class="control-date">{{ control.fecha|date:"d/m/Y" }}</span>
                    <span class="control-semanas">{{ control.semanas_gestacion }} semanas</span>
                </div>
                <div class="control-stats">
                    <span><strong>PA:</strong> {{ control.presion_arterial|default:"—" }}</span>
                    <span><strong>Peso:</strong> {{ control.peso|default:"—" }} kg</span>
                </div>
                {% if control.observaciones %}
                <div class="control-obs">{{ control.observaciones }}</div>
                {% endif %}
            </div>
            {% endfor %}
            {% else %}
            <div class="empty-state" style="padding:1.5rem;">
                <p>Aún no tienes controles prenatales registrados</p>
            </div>
            {% endif %}
        </div>
        {% endif %}
    </main>
</body>
</html>
